<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Biodata Form</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
padding:15px;
}

form {
width:100%;
max-width:480px;
background: linear-gradient(135deg, #87ceeb, #b0e0ff);
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2 {
text-align:center;
color:#003366;
font-weight:900;
}

label {
font-size:13px;
font-weight:900;
color:#003366;
display:block;
margin-top:10px;
}

input, select {
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:2px solid #cce6ff;
}

button {
margin-top:15px;
width:100%;
padding:12px;
background:#007acc;
color:white;
border:none;
border-radius:8px;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<form id="bioForm">
<h2>Visa Application Biodata Submission</h2>

<label>Full Name</label>
<input type="text" id="name" required>

<label>Home Address</label>
<input type="text" id="address" required>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Phone</label>
<input type="tel" id="phone" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Occupation</label>
<input type="text" id="occupation">

<label>Monthly Income</label>
<input type="text" id="income">

<label>Visa Package</label>
<select id="package">
<option>Youth Empowerment Visa</option>
<option>Educational Support Visa</option>
<option>Work Visa</option>
</select>

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Housing</label>
<select id="housing">
<option>Own House</option>
<option>Rent Apartment</option>
</select>

<button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
